[project]
name = "littlebox-backend"
version = "0.0.1"
requires-python = ">=3.14"
dependencies = [
    "fastapi[standard]",
    "uvicorn[standard]",
    "sqlalchemy[asyncio]",
    "asyncpg",
    "alembic",
    "redis[hiredis]",
    "pydantic-settings",
    "langchain>=0.3.0",
    "langgraph>=0.2.0",
    "dashscope>=1.25.2",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "httpx",
    "ruff",
    "basedpyright",
]

[tool.pytest.ini_options]
markers = ["live: needs real LLM API"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.basedpyright]
typeCheckingMode = "standard"
pythonVersion = "3.14"
